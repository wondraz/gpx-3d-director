<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GPX 3D Trail Director V15</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/maplibre-gl@4.3.2/dist/maplibre-gl.js"></script>
    <link href="https://unpkg.com/maplibre-gl@4.3.2/dist/maplibre-gl.css" rel="stylesheet" />
    
    <style>
        #map-wrapper {
            width: 100%; aspect-ratio: 16 / 9; position: relative;
            background: #050505; border-radius: 1.25rem; overflow: hidden;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.7); transition: all 0.3s ease;
        }
        .recording-mode {
            position: fixed !important; top: 0 !important; left: 0 !important;
            width: 100vw !important; height: 100vh !important;
            z-index: 99999 !important; border-radius: 0 !important;
        }
        #map { position: absolute; top: 0; left: 0; right: 0; bottom: 0; outline: none; }
        
        .hud-overlay { position: absolute; pointer-events: none; z-index: 10; text-shadow: 0px 3px 12px rgba(0, 0, 0, 0.9); }
        .ad-space { background-image: repeating-linear-gradient(45deg, #0f172a 25%, transparent 25%, transparent 75%, #0f172a 75%, #0f172a), repeating-linear-gradient(45deg, #0f172a 25%, #020617 25%, #020617 75%, #0f172a 75%, #0f172a); background-size: 20px 20px; }
        ::-webkit-scrollbar { width: 6px; } ::-webkit-scrollbar-track { background: #0f172a; } ::-webkit-scrollbar-thumb { background: #334155; border-radius: 4px; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
        .pulse-recording { animation: pulse 1.5s infinite; }
    </style>
</head>
<body class="bg-slate-950 text-slate-100 font-sans min-h-screen flex flex-col overflow-x-hidden">

    <header class="bg-slate-900 border-b border-slate-800 py-4 px-6 sticky top-0 z-50 shadow-lg">
        <div class="max-w-7xl mx-auto flex flex-col sm:flex-row justify-between items-center gap-4">
            <div class="flex items-center gap-3">
                <div class="bg-gradient-to-tr from-amber-500 to-orange-500 text-slate-950 p-2 rounded-xl font-black shadow-lg">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 10l4.553-2.276A1 1 0 0121 8.618v6.764a1 1 0 01-1.447.894L15 14M5 18h8a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v8a2 2 0 002 2z" />
                    </svg>
                </div>
                <div>
                    <h1 class="text-xl font-bold tracking-tight text-white flex items-center gap-2">
                        GPX 3D Trail Director <span class="bg-blue-500/10 text-blue-400 text-[10px] px-2.5 py-0.5 rounded-full uppercase font-extrabold border border-blue-500/30">V15</span>
                    </h1>
                </div>
            </div>
            <button id="btnSample" class="bg-slate-800 hover:bg-slate-700 text-white px-5 py-2.5 rounded-xl font-semibold text-sm transition-all shadow-lg border border-slate-700">
                🏔️ Načíst ukázku Krkonoše
            </button>
        </div>
    </header>

    <div class="max-w-7xl mx-auto w-full px-4 mt-6">
        <div class="w-full h-[90px] rounded-xl border border-slate-800 flex items-center justify-center ad-space shadow-md relative overflow-hidden group">
            <div class="text-center">
                <p class="text-xs text-slate-500 uppercase tracking-widest font-bold">Reklamní prostor</p>
                <p class="text-sm text-slate-400">Zde vložte kód (728x90)</p>
            </div>
        </div>
    </div>

    <main class="max-w-7xl mx-auto w-full px-4 py-6 flex-1 grid grid-cols-1 lg:grid-cols-4 gap-6">
        
        <div class="lg:col-span-1 flex flex-col gap-5">
            
            <div class="bg-slate-900 border border-slate-800 rounded-2xl p-4 shadow-xl">
                <h2 class="font-bold text-slate-400 mb-2 text-xs uppercase tracking-wider">1. Trasa a Název</h2>
                
                <div id="dropzone" class="border-2 border-dashed border-slate-700 hover:border-amber-500 rounded-xl p-6 text-center cursor-pointer transition-all bg-slate-950/50 mb-3 flex flex-col items-center justify-center">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8 text-slate-500 mb-2" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12" /></svg>
                    <p class="text-xs font-semibold text-slate-300" id="dropzoneText">Klikni nebo přetáhni .GPX</p>
                </div>
                
                <div id="nameInputWrapper" style="display:none; opacity:0; transition: opacity 0.4s;">
                    <label class="text-[10px] text-slate-500 uppercase font-bold tracking-wider block mb-1">Název ve videu (smaž pro skrytí):</label>
                    <input type="text" id="customRouteName" class="w-full bg-slate-800 border border-slate-700 rounded-lg px-3 py-2 text-sm text-white font-bold outline-none focus:border-amber-500 transition-all" />
                </div>
            </div>

            <div class="bg-slate-900 border border-slate-800 rounded-2xl p-4 shadow-xl" id="animationControls" style="opacity:0.3; pointer-events:none;">
                <h2 class="font-bold text-slate-400 mb-2 text-xs uppercase tracking-wider">2. Režie kamery</h2>
                <div class="flex flex-col gap-3">
                    <button id="btnPlay" class="w-full bg-gradient-to-r from-amber-500 to-orange-500 hover:from-amber-400 hover:to-orange-400 text-slate-950 font-black py-3 rounded-xl text-sm transition-all flex justify-center items-center gap-2 shadow-lg shadow-amber-500/20">
                        <span id="playIcon">▶</span> <span id="playText">Odstartovat let</span>
                    </button>
                    
                    <div class="grid grid-cols-2 gap-2 mt-1">
                        <div class="col-span-2 flex flex-col gap-1">
                            <div class="flex bg-slate-800 rounded-lg p-1 border border-slate-700">
                                <button id="styleSat" class="flex-1 bg-amber-600 text-white text-[11px] font-bold py-1.5 rounded-md transition-all shadow-md">Satelitní 🛰️</button>
                                <button id="styleTopo" class="flex-1 text-slate-400 text-[11px] font-bold py-1.5 rounded-md hover:text-white transition-all">Turistická 🗺️</button>
                            </div>
                        </div>

                        <div class="flex flex-col gap-1">
                            <span class="text-[10px] text-slate-500 uppercase font-bold tracking-wider">Tempo letu</span>
                            <select id="speedSelector" class="bg-slate-800 border border-slate-700 rounded-lg px-2 py-1.5 text-[11px] font-semibold text-white outline-none w-full cursor-pointer">
                                <option value="6">Pohoda</option>
                                <option value="16" selected>Svižný let</option>
                                <option value="36">Super rychlost</option>
                            </select>
                        </div>
                        <div class="flex flex-col gap-1">
                            <span class="text-[10px] text-slate-500 uppercase font-bold tracking-wider">Vrcholy & Města</span>
                            <button id="togglePois" class="bg-emerald-600 text-white border border-emerald-500 text-[11px] font-bold py-1.5 rounded-lg shadow-md transition-all">Zobrazeno ON</button>
                        </div>
                        
                        <div class="col-span-2 flex flex-col gap-2 mt-1 bg-slate-950/50 p-2.5 rounded-xl border border-slate-800">
                            <div class="flex items-center gap-2">
                                <input type="checkbox" id="ignoreSpeed" class="w-4 h-4 accent-amber-500 rounded cursor-pointer" checked />
                                <label for="ignoreSpeed" class="text-[11px] font-bold text-slate-300 cursor-pointer select-none">Plynule (kopec nekopec)</label>
                            </div>
                            <div class="flex items-center gap-2">
                                <input type="checkbox" id="showProfile" class="w-4 h-4 accent-amber-500 rounded cursor-pointer" checked />
                                <label for="showProfile" class="text-[11px] font-bold text-emerald-400 cursor-pointer select-none">Ukázat graf ve videu</label>
                            </div>
                            <div class="flex items-center gap-2">
                                <input type="checkbox" id="showEleGain" class="w-4 h-4 accent-amber-500 rounded cursor-pointer" checked />
                                <label for="showEleGain" class="text-[11px] font-bold text-blue-400 cursor-pointer select-none">Ukázat nastoupané metry</label>
                            </div>
                        </div>
                    </div>
                    
                    <hr class="border-slate-800 my-1">
                    
                    <button id="btnRecord" class="bg-red-600 hover:bg-red-500 text-white font-bold py-3 px-4 rounded-xl transition flex flex-col justify-center items-center text-xs shadow-lg shadow-red-900/20">
                        <div class="flex items-center gap-2">
                            <span class="w-2.5 h-2.5 bg-white rounded-full pulse-recording inline-block" id="recordPulse"></span>
                            <span id="recordText" class="text-sm">Nahrát video (Bez UI)</span>
                        </div>
                    </button>
                </div>
            </div>

            <div class="w-full h-[250px] rounded-2xl border border-slate-800 flex items-center justify-center ad-space shadow-md relative mt-2">
                <div class="text-center px-4">
                    <p class="text-xs text-slate-500 uppercase tracking-widest font-bold mb-1">Reklama</p>
                    <p class="text-[10px] text-slate-400">Box 300x250</p>
                </div>
            </div>

        </div>

        <div class="lg:col-span-3">
            <div id="map-wrapper">
                <div id="map"></div>
                
                <div id="hud-title" class="hud-overlay top-6 left-6" style="display:none">
                    <h2 class="text-3xl sm:text-5xl font-black text-white uppercase tracking-tight drop-shadow-xl" id="routeNameHud">Trasa načtena</h2>
                    <div id="hudTitleUnderline" class="w-24 h-2 bg-amber-500 mt-2 rounded-full shadow-[0_0_15px_rgba(245,158,11,0.6)]"></div>
                    <p id="hudElevationGain" class="text-sm sm:text-base font-bold text-amber-400 tracking-widest uppercase mt-3 drop-shadow-md" style="display:none;">
                        Nastoupáno: <span class="text-white" id="eleGainVal">0 m</span>
                    </p>
                </div>

                <div id="hud-profile-container" class="hud-overlay bottom-[120px] left-8 right-8 h-20 opacity-90 transition-opacity duration-300" style="display:none">
                    <canvas id="profileCanvas" width="1920" height="150" class="w-full h-full drop-shadow-lg"></canvas>
                </div>

                <div id="hud-stats" class="hud-overlay bottom-8 left-0 right-0 px-8 flex justify-between items-end" style="display:none">
                    <div class="flex gap-8 bg-black/60 p-5 rounded-3xl backdrop-blur-md border border-white/10 shadow-2xl">
                        <div>
                            <span class="text-xs font-bold text-amber-400 uppercase tracking-widest block mb-0.5 opacity-90">Ujeta vzdálenost</span>
                            <span class="text-5xl font-black text-white" id="hudDist">0.0<span class="text-2xl text-slate-300 ml-1">km</span></span>
                        </div>
                        <div class="border-l border-white/20 pl-8">
                            <span class="text-xs font-bold text-amber-400 uppercase tracking-widest block mb-0.5 opacity-90">Nadm. výška</span>
                            <span class="text-5xl font-black text-white" id="hudEle">0<span class="text-2xl text-slate-300 ml-1">m</span></span>
                        </div>
                    </div>
                </div>
                
                <div class="hud-overlay top-6 right-6 opacity-40">
                    <span class="text-xs sm:text-sm font-black text-white tracking-widest uppercase">Trail Director <span class="text-amber-500">3D</span></span>
                </div>
            </div>
        </div>
    </main>

    <footer class="w-full py-6 mt-8 border-t border-slate-900 bg-slate-950 text-center">
        <p class="text-xs text-slate-500 uppercase tracking-widest font-semibold">
            Vytvořil <span class="text-amber-500 font-black">Wondraz</span> © 2024
        </p>
    </footer>

    <input type="file" id="fileInput" accept=".gpx" style="display:none;" />

    <script>
        let map;
        let gpxtrackData = []; 
        let totalTrackDistance = 0; 
        let totalElevationGain = 0;

        let isPlaying = false;
        let currentIdx = 0;
        let currentAnimDist = 0; 
        let speedFactor = 16; 
        let animationFrameId = null; 
        let is3DMode = true; 
        let poisVisible = true;

        let smoothLat = null; let smoothLon = null; let smoothBearing = null; let smoothPitch = 65;
        let mediaRecorder = null; let recordedChunks = []; let isRecording = false;
        let videoMimeType = 'video/webm;codecs=vp9'; let videoExt = 'webm';

        function checkVideoFormatSupport() {
            if (MediaRecorder.isTypeSupported('video/mp4;codecs=avc1')) { videoMimeType = 'video/mp4;codecs=avc1'; videoExt = 'mp4'; } 
            else if (MediaRecorder.isTypeSupported('video/mp4')) { videoMimeType = 'video/mp4'; videoExt = 'mp4'; } 
            else { videoMimeType = 'video/webm;codecs=vp9'; videoExt = 'webm'; }
        }

        function initMap() {
            map = new maplibregl.Map({
                container: 'map',
                style: {
                    version: 8,
                    sources: {
                        'satellite': { type: 'raster', tiles: ['https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}'], tileSize: 256 },
                        'topo': { type: 'raster', tiles: ['https://a.tile.opentopomap.org/{z}/{x}/{y}.png'], tileSize: 256 },
                        'terrainSource': { type: 'raster-dem', tiles: ['https://s3.amazonaws.com/elevation-tiles-prod/terrarium/{z}/{x}/{y}.png'], encoding: 'terrarium', tileSize: 256, maxzoom: 13 }
                    },
                    layers: [
                        { id: 'topo-layer', type: 'raster', source: 'topo', layout: { visibility: 'none' } },
                        { id: 'satellite-layer', type: 'raster', source: 'satellite', layout: { visibility: 'visible' } }
                    ],
                    terrain: { source: 'terrainSource', exaggeration: 1.8 } 
                },
                center: [15.732, 50.729], zoom: 12, pitch: 65, bearing: 0
            });
            map.setMaxPitch(85);
        }

        function getBearing(lat1, lon1, lat2, lon2) {
            const dLon = (lon2 - lon1) * Math.PI / 180;
            const y = Math.sin(dLon) * Math.cos(lat2 * Math.PI / 180);
            const x = Math.cos(lat1 * Math.PI / 180) * Math.sin(lat2 * Math.PI / 180) -
